{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h2>Login</h2>

{% if form.errors %}
  <div class="alert alert-danger" role="alert">
    Usuario o contraseña inválidos.
  </div>
{% endif %}

<form method="post" class="mt-3" style="max-width: 420px;">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label" for="id_username">Usuario</label>
    <input class="form-control" id="id_username" name="username" required autofocus>
  </div>
  <div class="mb-3">
    <label class="form-label" for="id_password">Contraseña</label>
    <input class="form-control" id="id_password" type="password" name="password" required>
  </div>

  {% if next %}
    <input type="hidden" name="next" value="{{ next }}">
  {% endif %}

  <button class="btn btn-primary" type="submit">Ingresar</button>
</form>
{% endblock %}
