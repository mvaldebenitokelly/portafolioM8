{% extends "base.html" %}
{% block title %}Eliminar Producto{% endblock %}
{% block content %}
<h2>Eliminar Producto</h2>
<p>¿Seguro que deseas eliminar <strong>{{ product.name }}</strong>?</p>

<form method="post">
  {% csrf_token %}
  <button class="btn btn-danger" type="submit">Sí, eliminar</button>
  <a class="btn btn-secondary" href="{% url 'catalog:product_list' %}">Cancelar</a>
</form>
{% endblock %}
